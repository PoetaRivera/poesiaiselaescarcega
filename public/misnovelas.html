<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novelas — Isela Escárcega</title>
  <meta name="description" content="Lee Un amor que nunca llegó, novela de Isela Escárcega. La historia de amor de Sarah y Carlo entre dos mundos.">
  <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin>
  <link rel="dns-prefetch" href="https://www.google-analytics.com">
  <link rel="stylesheet" href="paginas.css">
  <link rel="stylesheet" href="paginas1.css" />

  <style>
    #contenido {
      display: flex;
      flex-direction: row;
      gap: 12px;
      align-items: flex-start;
    }

    #panel-menu { flex: 0 0 220px; min-width: 180px; }

    #panel-novela {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    #titulonovela { text-align: center; }
    #titulonovela h2 { margin: 4px 0; }

    h3 {
      font-family: "AlmendraDisplay", serif;
      color: var(--teal-main);
      text-align: center;
      letter-spacing: 2px;
      font-size: 1rem;
      font-weight: normal;
      margin: 2px 0;
    }

    #modulo1 {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(180deg, #0d0d1a 0%, #0a0a0a 100%);
      border: 2px solid var(--teal-main);
      border-radius: 8px;
      padding: 10px;
    }

    #textopoemas {
      width: 100%;
      border: 2px solid var(--magenta-main);
      border-radius: 6px;
      overflow: hidden;
    }

    #texto {
      display: block;
      width: 100%;
      height: 560px;
      border: none;
    }

    .menu-novelas {
      background-color: #111;
      border: 1px solid var(--teal-main);
      border-radius: 6px;
      overflow: hidden;
    }

    .menu-novelas-titulo {
      padding: 10px 12px;
      color: var(--teal-light);
      font-family: "ShareTechMono", monospace;
      font-size: 0.85rem;
      border-bottom: 1px solid #1a3a3a;
    }

    .lista-novelas {
      list-style: none;
      margin: 0;
      padding: 4px 0;
    }

    .lista-novelas li {
      cursor: pointer;
      padding: 8px 16px;
      font-family: Georgia, serif;
      font-size: 0.85rem;
      color: #c8c0b8;
      border-left: 2px solid transparent;
      transition: background-color 0.15s, color 0.15s, border-color 0.15s;
    }

    .lista-novelas li:hover,
    .lista-novelas li.activo {
      background-color: #1a1a2e;
      color: var(--teal-light);
      border-left-color: var(--teal-main);
    }

    @media screen and (max-width: 700px) {
      #contenido { flex-direction: column; }
      #panel-menu { flex: none; width: 100%; }
      #texto { height: 420px; }
    }
  </style>
</head>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-VN08VK3NSW"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag() { dataLayer.push(arguments); }
  gtag('js', new Date());
  gtag('config', 'G-VN08VK3NSW');
</script>

<body>
  <div id="pagina">

    <div id="barraSuperior">
      <div id="fotoIzq">
        <img id="foto1" src="imagenes/foto1xxs.jpg" alt="Isela Escárcega" />
      </div>
      <div id="titulo">
        <h1>Mis Novelas</h1>
      </div>
      <div id="fotoDer">
        <img id="foto2" src="imagenes/foto1xxs.jpg" alt="Isela Escárcega" />
      </div>
    </div>

    <nav id="links">
      <a href="acercademi.html">Acerca<br />de mí</a>
      <a href="index.html">El<br />inicio</a>
      <a href="mipoesia.html">Mi<br />poesía</a>
      <a href="mislibros.html">Mis<br />libros</a>
      <a href="misrelatos.html">Mis<br />relatos</a>
    </nav>

    <div id="contenido">

      <div id="panel-menu">
        <div class="menu-novelas">
          <div class="menu-novelas-titulo">Selecciona una novela</div>
          <ul class="lista-novelas">
            <li data-src="novelas/unamorquenuncallego.html"
                data-capitulo="Capítulo I">
              Un amor que nunca llegó
            </li>
          </ul>
        </div>
      </div>

      <div id="panel-novela">
        <div id="titulonovela">
          <h2 id="titulo-novela">— Selecciona una novela —</h2>
          <h3 id="titulo-capitulo"></h3>
        </div>

        <div id="modulo1">
          <div id="textopoemas">
            <iframe id="texto" title="Texto de novela" loading="lazy"
              src="imagenes/unamorquenuncallego.jpg">
            </iframe>
          </div>
        </div>
      </div>

    </div>

    <footer id="footer">
      <div class="footer-nav">
        <a href="index.html">Inicio</a>
        <a href="mipoesia.html">Mi poesía</a>
        <a href="misrelatos.html">Mis relatos</a>
        <a href="mislibros.html">Mis libros</a>
        <a href="acercademi.html">Acerca de mí</a>
      </div>
      <p class="footer-copy">© 2026 Isela Escárcega — Todos los derechos reservados</p>
    </footer>
  </div>

  <script>
    const iframe = document.getElementById('texto');
    const tituloNovela = document.getElementById('titulo-novela');
    const tituloCapitulo = document.getElementById('titulo-capitulo');
    let itemActivo = null;

    document.querySelectorAll('.lista-novelas li[data-src]').forEach(function(li) {
      li.addEventListener('click', function() {
        if (itemActivo) itemActivo.classList.remove('activo');
        itemActivo = this;
        this.classList.add('activo');
        iframe.src = this.dataset.src;
        tituloNovela.textContent = this.textContent.trim();
        tituloCapitulo.textContent = this.dataset.capitulo || '';
      });
    });
  </script>
</body>

</html>
