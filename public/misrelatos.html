  <link rel="stylesheet" href="paginas.css">

  <style>
    #titulopoema { flex-grow: 1; height: auto; }

    #textopoemas {
      flex-grow: 1;
      border: 2px solid var(--magenta-main);
      border-radius: 6px;
      overflow: hidden;
    }

    #modulo1 {
      display: flex;
      flex-direction: column;
      flex-grow: 6;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #0d0d1a 0%, #0a0a0a 100%);
      border: 2px solid var(--teal-main);
      border-radius: 8px;
      gap: 4px;
      padding: 10px;
    }
  </style>

  <script src="jquery-3.6.0.js"></script>

  <script>

    $(document).ready(function () {

      $('#textopoemas #texto').hide().fadeIn(1000);

      //Relatos
      $("#relato").mouseover(ponertitulo)
      $("#relato li").mouseover(presentar);

      //coloca el titulo del libro y la portada.
      function ponertitulo(e) {
        if (e.target == relato) {
          $("#enlace1").replaceWith('<h2 id="enlace1">Libro: Relatos de pueblo</h2>');
          $("#texto").replaceWith('<iframe id="texto" title="Texto de poema" height="600px" width="400px" src="imagenes/relatosdepueblo.jpg"> </iframe>');
        }
      }

      function presentar(e) {

        //libro:Voces del alma/sección amor
        if (e.target == r1) {
          $("#texto").replaceWith('<iframe id="texto" title="Texto de poema" height="600px" width="400px" src="relatos/cartapararafaelo.html"> </iframe>');

        } else if (e.target == r2) {
          $("#texto").replaceWith('<iframe id="texto" title="Texto de poema" height="600px" width="400px" src="relatos/elultimomartes.html"> </iframe>');

        } else if (e.target == r3) {
          $("#texto").replaceWith('<iframe id="texto" title="Texto de poema" height="600px" width="400px" src="relatos/lahabitacionblanca.html"> </iframe>');

        } else if (e.target == r4) {
          $("#texto").replaceWith('<iframe id="texto" title="Texto de poema" height="600px" width="400px" src="relatos/mimartina.html"> </iframe>');

        } else if (e.target == r5) {
          $("#texto").replaceWith('<iframe id="texto" title="Texto de poema" height="600px" width="400px" src="relatos/vientressinmemoria.html"> </iframe>');

        } else if (e.target == r6) {
          $("#texto").replaceWith('<iframe id="texto" title="Texto de poema" height="600px" width="400px" src="relatos/miultimoamante.html"> </iframe>');

        } else if (e.target == r7) {
          $("#texto").replaceWith('<iframe id="texto" title="Texto de poema" height="600px" width="400px" src="relatos/proximamente.html"> </iframe>');

        }
      }
    });
  </script>

</head>
